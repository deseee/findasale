<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80" role="img" aria-label="FindA.Sale logo — dark background variant">
  <!-- Dark background version for email headers, dark mode, etc. -->
  <rect width="320" height="80" fill="#1F2937" rx="8"/>

  <!-- Icon (same tag + magnifying glass, amber on dark) -->
  <path d="M12 14 L40 14 Q48 14 48 22 L48 50 Q48 58 40 58 L12 58 Q8 58 8 54 L8 18 Q8 14 12 14 Z"
        fill="#D97706" />
  <circle cx="17" cy="22" r="3.5" fill="#1F2937" />
  <line x1="17" y1="14" x2="17" y2="10.5" stroke="#1F2937" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="28" cy="38" r="9" fill="none" stroke="#1F2937" stroke-width="2.5" />
  <line x1="34.5" y1="44.5" x2="40" y2="50" stroke="#1F2937" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="25" cy="35" r="1.5" fill="#1F2937" opacity="0.7"/>

  <!-- "FindA." amber, "Sale" white -->
  <text x="62" y="53"
        font-family="Fraunces, Georgia, serif"
        font-size="34"
        font-weight="600"
        letter-spacing="-0.5"
        fill="#D97706">FindA.</text>
  <text x="175" y="53"
        font-family="Fraunces, Georgia, serif"
        font-size="34"
        font-weight="600"
        letter-spacing="-0.5"
        fill="#FAF8F6">Sale</text>

  <!-- Tagline in sage green -->
  <text x="63" y="68"
        font-family="Inter, -apple-system, sans-serif"
        font-size="11"
        font-weight="500"
        letter-spacing="1.8"
        fill="#6B9E7F">ESTATE SALES · GRAND RAPIDS</text>
</svg>