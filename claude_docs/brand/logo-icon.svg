<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="FindA.Sale icon">
  <!-- Square bg with rounded corners — for PWA/favicon use -->
  <rect width="64" height="64" rx="14" fill="#D97706"/>

  <!-- Tag body (white) -->
  <path d="M14 16 L44 16 Q51 16 51 23 L51 47 Q51 54 44 54 L14 54 Q11 54 11 51 L11 19 Q11 16 14 16 Z"
        fill="#FAF8F6" opacity="0.95"/>

  <!-- Tag hole -->
  <circle cx="19" cy="23" r="3" fill="#D97706"/>

  <!-- Magnifying glass circle (amber) -->
  <circle cx="32" cy="38" r="8.5" fill="none" stroke="#D97706" stroke-width="2.5"/>
  <!-- Magnifying glass handle -->
  <line x1="38" y1="44" x2="43" y2="49" stroke="#D97706" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Highlight dot inside lens -->
  <circle cx="29" cy="35" r="1.5" fill="#D97706" opacity="0.4"/>
</svg>